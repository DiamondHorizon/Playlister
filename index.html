<body>
  <h1>My Playlist</h1>

  <button id="shuffleToggle" style="
    margin-bottom: 10px;
    padding: 6px 12px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
  ">
    Shuffle: ON
  </button>

  <div class="player-wrapper">
    <iframe id="ytPlayer"
      width="560"
      height="315"
      src=""
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    const playlistId = "PL9wkJkRUXMSokLJ6zizzG5CNGprxOyX2-";
    const origin = "https://DiamondHorizon.github.io"; // <-- update this

    let shuffleOn = true;

    function buildURL() {
      return `https://www.youtube.com/embed/?listType=playlist&list=${playlistId}&autoplay=1&loop=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&origin=${origin}&shuffle=${shuffleOn ? 1 : 0}`;
    }

    function loadPlayer() {
      document.getElementById("ytPlayer").src = buildURL();
    }

    document.getElementById("shuffleToggle").onclick = () => {
      shuffleOn = !shuffleOn;
      document.getElementById("shuffleToggle").textContent = "Shuffle: " + (shuffleOn ? "ON" : "OFF");
      loadPlayer();
    };

    // Load on startup
    loadPlayer();
  </script>
</body>
