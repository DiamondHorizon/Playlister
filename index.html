<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlister</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }
    h1 {
      margin-bottom: 10px;
    }
    #player-container {
      margin: 20px 0;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    button {
      padding: 6px 12px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    #status {
      font-size: 0.9rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1>Playlister 1.1.3</h1>
  <div class="controls">
    <button id="prevBtn">Prev</button>
    <button id="nextBtn">Next</button>
  </div>
  <div id="status">Loading playlist…</div>

  <div id="player-container">
    <div id="player"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // --- CONFIG ---
    const apiKey = "AIzaSyCLkdtNrpdDA_-j9U0FvQEjqnkvF-OxGs4";
    const playlistId = "PL9wkJkRUXMSokLJ6zizzG5CNGprxOyX2-";
    const origin = "https://diamondhorizon.github.io"; // your real origin

    // --- STATE ---
    let allIds = [];
    let queue = [];
    let currentIndex = 0;
    let player;

    const statusEl = document.getElementById("status");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    // --- LocalStorage helpers for recent history ---
    function loadRecent() {
      try {
        return JSON.parse(localStorage.getItem("recentlyPlayedFull")) || [];
      } catch {
        return [];
      }
    }

    function saveRecent(list) {
      localStorage.setItem("recentlyPlayedFull", JSON.stringify(list));
    }

    function updateRecent(playedId) {
      const recent = loadRecent();
      const updated = [playedId, ...recent.filter(id => id !== playedId)];
      const trimmed = updated.slice(0, 100); // remember last 100
      saveRecent(trimmed);
    }

    // --- Shuffle helper ---
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Build a shuffled queue of all IDs, avoiding recent if possible
    function buildQueue() {
      const recent = loadRecent();
      const filtered = allIds.filter(id => !recent.includes(id));

      let base;
      if (filtered.length < 50) {
        // Too many filtered out, reset recent and use full list
        saveRecent([]);
        base = [...allIds];
      } else {
        base = filtered;
      }

      queue = shuffle([...base]);
      currentIndex = 0;
    }

    // --- YouTube IFrame API callback ---
    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        height: "315",
        width: "560",
        playerVars: {
          autoplay: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          origin: origin
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerReady() {
      // Once player is ready, fetch playlist and start
      init();
    }

    function onPlayerStateChange(event) {
      // When video ends, auto-advance
      if (event.data === YT.PlayerState.ENDED) {
        playNext();
      }
    }

    // --- Fetch all video IDs from playlist ---
    async function fetchAllVideoIds() {
      let ids = [];
      let nextPage = "";

      do {
        const url = new URL("https://www.googleapis.com/youtube/v3/playlistItems");
        url.searchParams.set("part", "contentDetails");
        url.searchParams.set("maxResults", "50");
        url.searchParams.set("playlistId", playlistId);
        url.searchParams.set("key", apiKey);
        if (nextPage) url.searchParams.set("pageToken", nextPage);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.items) {
          console.error("API error:", data);
          throw new Error("Failed to fetch playlist items");
        }

        ids.push(...data.items.map(v => v.contentDetails.videoId));
        nextPage = data.nextPageToken || "";
      } while (nextPage);

      return ids;
    }

    async function init() {
      try {
        statusEl.textContent = "Loading playlist…";
        allIds = await fetchAllVideoIds();
        statusEl.textContent = `Loaded ${allIds.length} videos. Building shuffled queue…`;

        buildQueue();
        playCurrent();
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error loading playlist.";
      }
    }

    function playCurrent() {
      if (!queue.length) return;
      const videoId = queue[currentIndex];
      statusEl.textContent = `Playing ${currentIndex + 1} of ${queue.length}`;
      player.loadVideoById(videoId);
      updateRecent(videoId);

      // --- Media Session metadata ---
      if ("mediaSession" in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: `Track ${currentIndex + 1}`,
          artist: "YouTube Playlist",
          album: "Playlister",
          artwork: [
            { src: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`, sizes: "512x512", type: "image/jpeg" }
          ]
        });
      }
    }

    function playNext() {
      if (!queue.length) return;
      currentIndex++;
      if (currentIndex >= queue.length) {
        // Rebuild queue when we reach the end
        buildQueue();
      }
      playCurrent();
    }

    function playPrev() {
      if (!queue.length) return;
      currentIndex--;
      if (currentIndex < 0) {
        currentIndex = 0;
      }
      playCurrent();
    }

    if ("mediaSession" in navigator) {
      navigator.mediaSession.setActionHandler("nexttrack", playNext);
      navigator.mediaSession.setActionHandler("previoustrack", playPrev);
      navigator.mediaSession.setActionHandler("play", () => player.playVideo());
      navigator.mediaSession.setActionHandler("pause", () => player.pauseVideo());
    }

    // --- Button handlers ---
    nextBtn.addEventListener("click", playNext);
    prevBtn.addEventListener("click", playPrev);
  </script>
</body>
</html>
