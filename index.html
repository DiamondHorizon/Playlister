<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlister</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding-top: 40px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      width: 90%;
      max-width: 600px;
    }
    .controls input {
      width: 100%;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #181818;
      color: #eee;
    }
    .controls button {
      padding: 6px 12px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
    }
    .controls button:hover {
      background: #333;
    }
    .info-box {
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 12px;
      text-align: center;
    }
    .player-wrapper {
      width: 320px;
      height: 60px;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }
    iframe {
      width: 100%;
      height: 180px;
      transform: translateY(-60px);
      border: none;
    }
  </style>
</head>
<body>
  <h1>Playlister</h1>

  <div class="controls">
    <input id="playlistInput" type="text"
      placeholder="Paste YouTube playlist URL (or leave for default)">
    <div>
      <button id="loadBtn">Load Playlist</button>
      <button id="shuffleToggle">Shuffle: ON</button>
    </div>
  </div>

  <div class="info-box" id="infoBox">
    Loading playlist info…
  </div>

  <div class="player-wrapper">
    <iframe id="ytPlayer"
      width="560"
      height="315"
      src=""
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>

  <!-- YouTube Iframe API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // === CONFIG ===
    const defaultPlaylistId = "PL9wkJkRUXMSokLJ6zizzG5CNGprxOyX2-";
    const origin = "https://diamondhorizon.github.io";
    const apiKey = "AIzaSyCLkdtNrpdDA_-j9U0FvQEjqnkvF-OxGs4";

    // === STATE ===
    let currentPlaylistId = defaultPlaylistId;
    let shuffleOn = true;
    let playlistLength = 0;
    let ytPlayerAPIReady = false;
    let ytPlayer;

    const playerEl = document.getElementById("ytPlayer");
    const shuffleBtn = document.getElementById("shuffleToggle");
    const loadBtn = document.getElementById("loadBtn");
    const inputEl = document.getElementById("playlistInput");
    const infoBox = document.getElementById("infoBox");

    // YouTube API callback
    function onYouTubeIframeAPIReady() {
      ytPlayerAPIReady = true;
      ytPlayer = new YT.Player('ytPlayer', {
        events: {
          onReady: () => {
            // Enable loop AFTER load so shuffle still works
            ytPlayer.setLoop(true);
          }
        }
      });
    }

    // Extract playlist ID from URL or raw ID
    function extractPlaylistId(text) {
      if (!text) return defaultPlaylistId;
      try {
        if (text.includes("http")) {
          const url = new URL(text.trim());
          const list = url.searchParams.get("list");
          if (list) return list;
        }
      } catch (e) {}
      return text.trim();
    }

    function buildEmbedURL() {
      const randomIndex = shuffleOn
        ? Math.floor(Math.random() * Math.max(playlistLength, 1))
        : 0;

      return `https://www.youtube.com/embed/?listType=playlist&list=${currentPlaylistId}` +
             `&autoplay=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1` +
             `&origin=${encodeURIComponent(origin)}` +
             `&shuffle=${shuffleOn ? 1 : 0}` +
             `&index=${randomIndex}`;
    }

    function loadPlayer() {
      playerEl.src = buildEmbedURL();
      fetchPlaylistInfo(currentPlaylistId);
    }

    // Convert ISO 8601 duration to seconds
    function isoDurationToSeconds(iso) {
      const regex = /PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/;
      const m = iso.match(regex);
      if (!m) return 0;
      const h = parseInt(m[1] || "0", 10);
      const min = parseInt(m[2] || "0", 10);
      const s = parseInt(m[3] || "0", 10);
      return h * 3600 + min * 60 + s;
    }

    function formatSeconds(total) {
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (h > 0) {
        return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      } else {
        return `${m}:${String(s).padStart(2, "0")}`;
      }
    }

    async function fetchPlaylistInfo(playlistId) {
      infoBox.textContent = "Loading playlist info…";

      try {
        let videoIds = [];
        let nextPageToken = "";

        // Fetch all playlist items
        do {
          const url = new URL("https://www.googleapis.com/youtube/v3/playlistItems");
          url.searchParams.set("part", "contentDetails");
          url.searchParams.set("maxResults", "50");
          url.searchParams.set("playlistId", playlistId);
          url.searchParams.set("key", apiKey);
          if (nextPageToken) url.searchParams.set("pageToken", nextPageToken);

          const res = await fetch(url.toString());
          const data = await res.json();

          const ids = data.items
            .map(item => item.contentDetails?.videoId)
            .filter(Boolean);

          videoIds = videoIds.concat(ids);
          nextPageToken = data.nextPageToken || "";
        } while (nextPageToken);

        playlistLength = videoIds.length;

        if (playlistLength === 0) {
          infoBox.textContent = "No videos found.";
          return;
        }

        // Fetch durations
        let totalSeconds = 0;
        for (let i = 0; i < videoIds.length; i += 50) {
          const batch = videoIds.slice(i, i + 50);
          const url = new URL("https://www.googleapis.com/youtube/v3/videos");
          url.searchParams.set("part", "contentDetails");
          url.searchParams.set("id", batch.join(","));
          url.searchParams.set("key", apiKey);

          const res = await fetch(url.toString());
          const data = await res.json();

          for (const v of data.items) {
            const dur = v.contentDetails?.duration;
            if (dur) totalSeconds += isoDurationToSeconds(dur);
          }
        }

        const totalTime = formatSeconds(totalSeconds);
        infoBox.textContent = `Videos: ${playlistLength} • Total time: ${totalTime}`;
      } catch (err) {
        console.error(err);
        infoBox.textContent = "Could not load playlist info.";
      }
    }

    // Load button
    loadBtn.onclick = () => {
      const text = inputEl.value;
      currentPlaylistId = extractPlaylistId(text);
      loadPlayer();
    };

    // Shuffle toggle
    shuffleBtn.onclick = () => {
      shuffleOn = !shuffleOn;
      shuffleBtn.textContent = "Shuffle: " + (shuffleOn ? "ON" : "OFF");
      loadPlayer();
    };

    // Initial load
    window.addEventListener("load", () => {
      inputEl.value = `https://www.youtube.com/playlist?list=${defaultPlaylistId}`;
      loadPlayer();
    });
  </script>
</body>
</html>
