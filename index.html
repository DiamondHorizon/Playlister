<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlister</title>
</head>
<body>
  <h1>My Playlist</h1>
  <div class="player-wrapper">
    <iframe width="560" 
      height="315" 
      src="https://www.youtube.com/embed/videoseries?si=_Z_--g5KZUX365vz&amp;list=PL9wkJkRUXMSokLJ6zizzG5CNGprxOyX2-"

</html>
