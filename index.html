<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlister</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    .player-wrapper {
      width: 320px;
      height: 60px;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }
    iframe {
      width: 100%;
      height: 180px;
      transform: translateY(-60px);
      border: none;
    }
  </style>
</head>
<body>
  <h1>My Playlist</h1>
  <div class="player-wrapper">
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/?listType=playlist&list=PL9wkJkRUXMSokLJ6zizzG5CNGprxOyX2-&autoplay=1&loop=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&origin=https://diamondhorizon.github.io"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
